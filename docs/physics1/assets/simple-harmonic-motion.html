<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Simple Harmonic Motion</title>
<style>
  :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
  body { max-width: 800px; margin: 0 auto; padding: 1.5rem; }
  canvas { width: 100%; height: 220px; background: linear-gradient(180deg,#1f2937,#0f172a); border-radius: 0.75rem; }
  .controls { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }
  label { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.9rem; }
  input[type="range"] { width: 14rem; }
  code { background: #00000020; padding: .1rem .4rem; border-radius: .25rem; }
</style>
</head>
<body>
  <h1>Simple Harmonic Motion</h1>
  <p>Mass on a spring: <code>x(t) = A·cos( ω·t + φ )</code> with <code>ω = √(k/m)</code></p>
  <canvas id="canvas"></canvas>
  <div class="controls">
    <label>Amplitude <input id="A" type="range" min="0.2" max="1.5" step="0.05" value="1" /></label>
    <label>k <input id="k" type="range" min="5" max="50" step="1" value="20" /></label>
    <label>m <input id="m" type="range" min="0.5" max="8" step="0.25" value="2" /></label>
    <label>Speed <input id="speed" type="range" min="0.1" max="3" step="0.05" value="1" /></label>
  </div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let t = 0;
    function resize(){ canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; }
    window.addEventListener('resize', resize); resize();
    function draw(){
      const A = parseFloat(document.getElementById('A').value);
      const k = parseFloat(document.getElementById('k').value);
      const m = parseFloat(document.getElementById('m').value);
      const speed = parseFloat(document.getElementById('speed').value);
      const w = Math.sqrt(k/m);
      const xMid = canvas.width/2;
      const yMid = canvas.height/2;
      const scale = 60;
      ctx.fillStyle = '#111827'; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.strokeStyle = '#475569'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0,yMid); ctx.lineTo(canvas.width,yMid); ctx.stroke();
      ctx.beginPath(); ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = 2;
      for (let i=0;i<canvas.width;i++){
        const time = (i/canvas.width)*4*Math.PI/speed - t;
        const x = A*Math.cos(w*time);
        const y = yMid - x*scale;
        i===0 ? ctx.moveTo(i,y) : ctx.lineTo(i,y);
      }
      ctx.stroke();
      const disp = A*Math.cos(w*t);
      ctx.fillStyle = '#f9a8d4';
      ctx.beginPath(); ctx.arc(xMid + disp*scale, yMid, 7, 0, Math.PI*2); ctx.fill();
      t += 0.05*speed;
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
