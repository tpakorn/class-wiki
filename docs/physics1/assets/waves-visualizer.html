<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wave Visualizer</title>
<style>
  :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
  body { max-width: 880px; margin: 0 auto; padding: 1.25rem; }
  canvas { width: 100%; border-radius: .75rem; background:#0b1220; }
  .controls { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }
  label { display:flex; flex-direction:column; gap: .25rem; font-size: .9rem; }
  input[type="range"] { width: 14rem; }
</style>
</head>
<body>
  <h1>Wave Visualizer</h1>
  <p>Traveling wave: <code>y(x,t) = A·sin( k·x − ω·t + φ )</code></p>
  <canvas id="canvas"></canvas>
  <div class="controls">
    <label>Amplitude <input id="A" type="range" min="0.1" max="1" step="0.05" value="0.5" /></label>
    <label>Frequency <input id="f" type="range" min="0.1" max="2" step="0.05" value="0.6" /></label>
    <label>Wavelength <input id="lam" type="range" min="30" max="160" step="1" value="80" /></label>
    <label>Speed <input id="speed" type="range" min="0.2" max="3" step="0.1" value="1" /></label>
  </div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let t = 0;
    function resize(){ canvas.width = canvas.clientWidth; canvas.height = 220; }
    window.addEventListener('resize', resize); resize();
    function draw(){
      const A = parseFloat(document.getElementById('A').value);
      const f = parseFloat(document.getElementById('f').value);
      const lam = parseFloat(document.getElementById('lam').value);
      const speed = parseFloat(document.getElementById('speed').value);
      const k = (2*Math.PI)/lam;
      const w = 2*Math.PI*f;
      ctx.fillStyle = '#0b1220'; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.strokeStyle = '#f472b6'; ctx.lineWidth = 2;
      ctx.beginPath();
      for (let x=0;x<canvas.width;x++){
        const y = canvas.height/2 - A*100*Math.sin(k*x - w*t);
        x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
      }
      ctx.stroke();
      t += 0.03*speed;
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
